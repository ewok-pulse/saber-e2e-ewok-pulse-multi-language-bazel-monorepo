# ─────────────────────────────────────────────────────────────────
# Generated by Saber v0.1.0 on 2026-05-21 for multi-language-bazel-monorepo
#
#   Languages:    go, javascript/typescript, python
#   Build:        bazel, pnpm, go
#   Namespace:    endor-solutions-ypulse.github-ci.saber-e2e
#   Auth:         GitHub OIDC (keyless)
#   PR behavior:  comment on PR (non-blocking)
#   PR scan mode: quick
#
# Regenerate this file with `saber scan repo` (point at this repo's path).
# Hand-edits will be overwritten on the next regeneration.
# ─────────────────────────────────────────────────────────────────
name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            go:
              - '**/go.mod'
              - '**/go.sum'
              - '**/*.go'
            javascript-typescript:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/yarn.lock'
              - '**/pnpm-lock.yaml'
              - '**/rush.json'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
  scan-go-pr:
    name: "PR Scan: go"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.18" # detected from Bazel go_version
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=go --quick-scan"
    env:
      # Multi-go-version repo — Saber pins standard-library matching to each module's go directive.
      ENDOR_SCAN_USE_GOMOD_VERSION: "true"
  scan-go-monitor:
    name: "Monitor Scan: go"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.18" # detected from Bazel go_version
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=go"
          sarif_file: findings.sarif
          scan_github_actions: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-go
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
      # Multi-go-version repo — Saber pins standard-library matching to each module's go directive.
      ENDOR_SCAN_USE_GOMOD_VERSION: "true"
  scan-javascript-typescript-pr:
    name: "PR Scan: javascript/typescript"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.javascript-typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install -g pnpm@8 # pinned from pnpm-lock.yaml lockfileVersion
      - run: pnpm install --frozen-lockfile
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=javascript,typescript --quick-scan"
  scan-javascript-typescript-monitor:
    name: "Monitor Scan: javascript/typescript"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install -g pnpm@8 # pinned from pnpm-lock.yaml lockfileVersion
      - run: pnpm install --frozen-lockfile
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=javascript,typescript"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-javascript-typescript
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"